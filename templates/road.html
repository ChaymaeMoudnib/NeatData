<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeatData Roadmap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="static/road.css">
</head>
<body>

<div class="container-fluid roadmap-container">
    <div class="roadmap-path">
        <div class="path-line"></div>
        <div class="stage stage-1" data-bs-toggle="tooltip" data-bs-placement="top" title="This is the first step in the roadmap">
            <i class="fas fa-database"></i>
            <h3>Step 1</h3>
            <p>Data Collection</p>
        </div>
        <div class="stage stage-2" data-bs-toggle="tooltip" data-bs-placement="top" title="Clean the collected data for better analysis">
            <i class="fas fa-broom"></i>
            <h3>Step 2</h3>
            <p>Data Cleaning</p>
        </div>
        <div class="stage stage-3" data-bs-toggle="tooltip" data-bs-placement="top" title="Explore the cleaned data to find patterns">
            <i class="fas fa-chart-bar"></i>
            <h3>Step 3</h3>
            <p>Data Exploration</p>
        </div>
        <div class="stage stage-4" data-bs-toggle="tooltip" data-bs-placement="top" title="Build models using the explored data">
            <i class="fas fa-cogs"></i>
            <h3>Step 4</h3>
            <p>Modeling</p>
        </div>
        <div class="stage stage-5" data-bs-toggle="tooltip" data-bs-placement="top" title="Deploy the models to production">
            <i class="fas fa-rocket"></i>
            <h3>Step 5</h3>
            <p>Deployment</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>

</body>
</html>
